<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>nostalgia</title>
    <meta name="description" content="nostalgia">
    <meta name="author" content="Mario Moreno (m4mc3r@gmail.com)">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
    <link rel="stylesheet" href="./main.css">
</head>

<body>
    <a id="files" href="index.html">home</a>&nbsp;
    <a id="directory" href="dir.html?id=1">directory</a>

    </br>

    <form id="search-form">
        <input id="search" type="text" placeholder="has the words" autocomplete="off" autofocus />
        <input type="submit" value="search"></input>
    </form>

    <a id="advanced-search" href="#">advanced search</a>

    <div id="advanced-search-panel" style="display:none">
        <div>
            <label for="type">type</label>
            <select id="type">
                <option value="all">all</option>
                <option value="image">image</option>
                <option value="audio">audio</option>
                <option value="video">video</option>
                <option value="doc">doc</option>
                <option value="sheet">sheet</option>
                <option value="zip">zip</option>
            </select>
        </div>
        <div>
            <label for="date-from">date from</label>
            <input id="date-from" type="date" placeholder="date from" autocomplete="off" />
        </div>
        <div>
            <label for="date-to">date to</label>
            <input id="date-to" type="date" placeholder="date to" autocomplete="off" />
        </div>
        <div>
            <input type="checkbox" id="include-directories" name="include-directories" checked>
            <label for="include-directories">include directories</label>
        </div>
    </div>

    <div id="message"></div>
    <div id="result"></div>

    <script type="text/javascript" src="./config.js"></script>
    <script type="text/javascript" src="./search.js"></script>
</body>

</html>
